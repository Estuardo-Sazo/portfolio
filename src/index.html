<!DOCTYPE html>
<html lang="es" class="dark">
  <head>
    <meta charset="utf-8" />
    <base href="/" />

    <title>Jaime Sazo | Desarrollador Full Stack</title>

    <meta
      name="description"
      content="Portafolio de Jaime Sazo, Ingeniero en Sistemas y Desarrollador Full Stack especializado en Angular, NestJS y Odoo."
    />

    <meta
      name="keywords"
      content="jaszcode, Jaime Sazo, Angular, NestJS, ERP, FEL, Desarrollador Full Stack, Portafolio, Odoo, Guatemala"
    />

    <meta name="author" content="Jaime Sazo" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0c" />

    <!-- Apply saved theme before paint to avoid FOUC -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark = t ? t === 'dark' : true; // dark is the default
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>

    <meta property="og:title" content="Jaime Sazo | Full Stack Developer" />
    <meta
      property="og:description"
      content="Portafolio profesional con proyectos en Angular, NestJS y Odoo."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.jaszcode.site/" />
    <meta property="og:image" content="https://www.jaszcode.site/icons/me.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="icons/git.svg" />
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
