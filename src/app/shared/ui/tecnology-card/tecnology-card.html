<div
  class="group flex flex-col items-center justify-center gap-3 p-6 rounded-2xl border border-line bg-card hover:border-brand/40 hover:bg-elevated transition-all duration-300 hover:-translate-y-1"
>
  <img
    [src]="tecnology()?.icon"
    [alt]="tecnology()?.name"
    class="w-10 h-10 md:w-12 md:h-12 transition-transform duration-300 group-hover:scale-110"
    loading="lazy"
  />
  <span class="text-sm md:text-base font-medium text-muted group-hover:text-ink transition-colors">{{
    tecnology()?.name
  }}</span>
</div>
